<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login page</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="main-container">
        <div class="navigation-container">
            <div class="left-container">
                <img src="Images/safari logo.png">
            </div>
        </div>
        
        <div class="login-container">
            <div class="logo-container">
                <img src="Images/safari logo.png" alt="">
            </div>

        <div class="user-details-container">
            <div class="username-section">
                <i class="fa-regular fa-user"></i>
                <input type="text" id="username" placeholder="Enter Phonenumber">
            </div>

            <div class="password-section">
                <i class="fa-solid fa-lock"></i>
                <input type="password" id="password" placeholder="password">
            </div>
        </div>
        <div class="mainlogin-container">
                <button class="login">Login</button>
        </div>

        <div class="forget-remember-container">
                <div class="remember-section">
                    <label for=""><input type="checkbox"> Remember me</label>   
                </div>
                <div class="forget-section">
                    <a href="#">Forget password</a>
                </div>

        </div>
        <div class="register-container">
            <p>Don't have Account?<a href="#">Register</a></p>
        </div>
    </div>
    </div>
    
        
<script src="https://kit.fontawesome.com/e29314cdc4.js" crossorigin="anonymous"></script>
</body>
</html>
